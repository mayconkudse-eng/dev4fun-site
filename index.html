<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dev4Fun 👾 Full Stack Lab</title>
  <link rel="icon" type="image/png" href="assets/LOGO-LETRA-PRETA.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Playfair+Display:ital,wght@0,700;0,800;0,900;1,700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            display: ['Playfair Display', 'serif'],
            mono: ['JetBrains Mono', 'monospace'],
          },
        }
      }
    }
  </script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      height: 100%;
      overflow: hidden;
      background: #F4F4F0;
      color: #000;
      font-family: 'Inter', sans-serif;
    }
    ::selection { background: #FF2A2A; color: #fff; }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.6' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      opacity: 0.015;
      pointer-events: none;
      z-index: 9999;
    }

    /* === HEADER === */
    header {
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 28px;
      border-bottom: 1px solid rgba(0,0,0,0.06);
      flex-shrink: 0;
      position: relative;
      z-index: 50;
      background: #F4F4F0;
    }
    .nav-link {
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: rgba(0,0,0,0.35);
      text-decoration: none;
      transition: color 0.2s;
      cursor: pointer;
      font-weight: 500;
    }
    .nav-link:hover, .nav-link.active { color: #000; }
    .nav-link.active { font-weight: 700; }
    .nav-desktop { display: flex; align-items: center; gap: 2rem; }
    .hamburger {
      display: none;
      background: none;
      border: none;
      font-size: 1.3rem;
      cursor: pointer;
      color: rgba(0,0,0,0.4);
      padding: 4px 8px;
      line-height: 1;
      transition: color 0.2s;
    }
    .hamburger:hover { color: #000; }
    @media (max-width: 639px) {
      .hamburger { display: block; }
      .nav-desktop {
        display: none;
        position: fixed;
        top: 52px;
        left: 0;
        right: 0;
        background: #F4F4F0;
        flex-direction: column;
        gap: 0;
        padding: 8px 28px 12px;
        border-bottom: 1px solid rgba(0,0,0,0.06);
        z-index: 49;
        box-shadow: 0 20px 40px rgba(0,0,0,0.06);
      }
      .nav-desktop.open { display: flex; }
      .nav-desktop .nav-link {
        padding: 10px 0;
        font-size: 0.8rem;
        letter-spacing: 0.12em;
        border-bottom: 1px solid rgba(0,0,0,0.04);
      }
      .nav-desktop .nav-link:last-child { border-bottom: none; }
    }

    .social-icon {
      width: 28px; height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      transition: all 0.2s;
      color: rgba(0,0,0,0.25);
    }
    .social-icon:hover { color: #000; background: rgba(0,0,0,0.04); }
    .social-icon svg { width: 15px; height: 15px; fill: none; stroke: currentColor; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
    .social-icon.discord svg { fill: currentColor; stroke: none; }

    /* === MAIN SPLIT === */
    main {
      flex: 1;
      display: flex;
      min-height: 0;
    }
    .panel-left {
      width: 50%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 32px 44px 32px 52px;
      overflow-y: auto;
    }
    .panel-right {
      width: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    /* === LEFT PANEL === */
    .kicker {
      font-size: 0.55rem;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #FF2A2A;
      margin-bottom: 0.6rem;
      line-height: 1.4;
    }
    .hero-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.8rem, 3.5vw, 3.5rem);
      font-weight: 900;
      line-height: 1.05;
      margin-bottom: 0.6rem;
      letter-spacing: -0.02em;
    }
    .hero-sub {
      font-size: clamp(0.65rem, 0.9vw, 0.85rem);
      color: rgba(0,0,0,0.5);
      line-height: 1.6;
      max-width: 92%;
      margin-bottom: 1.25rem;
    }
    .cta-primary {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.6rem 1.6rem;
      background: #000;
      color: #fff;
      font-weight: 700;
      font-size: 0.7rem;
      border-radius: 9999px;
      text-decoration: none;
      transition: all 0.3s ease;
      border: none;
      cursor: pointer;
      align-self: flex-start;
    }
    .cta-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(0,0,0,0.12); }

    /* === ABOUT === */
    .about-text {
      font-size: clamp(0.55rem, 0.75vw, 0.75rem);
      color: rgba(0,0,0,0.55);
      line-height: 1.7;
      margin-bottom: 1rem;
      max-width: 95%;
    }
    .about-text strong { color: rgba(0,0,0,0.8); }
    .skills-cloud {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
    }
    .skill-pill {
      background: rgba(0,0,0,0.03);
      border: 1px solid rgba(0,0,0,0.06);
      border-radius: 9999px;
      padding: 0.3rem 0.8rem;
      font-size: 0.55rem;
      font-weight: 500;
      color: rgba(0,0,0,0.7);
    }

    /* === TIERS BALLOONS === */
    .tiers-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 0.45rem;
    }
    .tier-balloon {
      background: rgba(0,0,0,0.02);
      border: 1px solid rgba(0,0,0,0.06);
      border-radius: 10px;
      padding: 0.6rem 0.75rem;
      cursor: pointer;
      transition: all 0.25s ease;
    }
    .tier-balloon:hover {
      background: rgba(0,0,0,0.04);
      border-color: rgba(0,0,0,0.12);
      transform: translateY(-2px);
    }
    .tier-balloon-name {
      font-weight: 700;
      font-size: 0.7rem;
      line-height: 1.2;
    }
    .tier-balloon-price {
      font-size: 0.6rem;
      font-weight: 600;
      color: rgba(0,0,0,0.4);
      margin-top: 0.1rem;
    }

    /* === SHOP GRID === */
    .shop-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.5rem;
    }
    .shop-card {
      background: rgba(0,0,0,0.02);
      border: 1px solid rgba(0,0,0,0.06);
      border-radius: 10px;
      padding: 0.6rem;
      text-align: center;
      cursor: pointer;
      transition: all 0.25s ease;
    }
    .shop-card:hover { background: rgba(0,0,0,0.04); border-color: rgba(0,0,0,0.12); transform: translateY(-2px); }
    .shop-card-icon { font-size: 1.4rem; margin-bottom: 0.2rem; }
    .shop-card-name { font-size: 0.55rem; font-weight: 600; }
    .shop-card-price { font-size: 0.5rem; color: rgba(0,0,0,0.35); }

    /* === MACINTOSH 128k === */
    .mac-wrapper {
      transform: perspective(1000px) rotateY(-5deg) rotateX(2deg);
      transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
      width: min(32vw, 380px);
    }
    .mac-wrapper:hover { transform: perspective(1000px) rotateY(-3deg) rotateX(1deg); }
    .mac-stand-neck {
      width: 38%; height: 18px;
      background: linear-gradient(to bottom, #3a3a3a, #222);
      margin: 0 auto -2px;
      border-radius: 0 0 6px 6px;
      clip-path: polygon(4% 0, 96% 0, 100% 100%, 0 100%);
      border: 1px solid #444;
      border-top: none;
    }
    .mac-stand-base {
      width: 48%; height: 10px;
      background: #222; margin: 0 auto;
      border-radius: 0 0 4px 4px;
      border: 1px solid #333;
      border-top: none;
    }
    .mac-casing {
      background: linear-gradient(155deg, #f2e8d8 0%, #dcccae 40%, #c9b896 100%);
      border-radius: 30px 30px 14px 14px;
      padding: 16px 16px 20px;
      box-shadow: 25px 25px 80px rgba(0,0,0,0.12), -8px -8px 30px rgba(255,255,255,0.25), inset 0 1px 0 rgba(255,255,255,0.4), 0 0 0 1px rgba(180,160,130,0.3);
      position: relative;
    }
    .mac-casing::before {
      content: '';
      position: absolute;
      inset: 5px;
      border-radius: 25px 25px 9px 9px;
      border: 1px solid rgba(255,255,255,0.08);
      pointer-events: none;
    }
    .mac-bezel {
      background: #111;
      border-radius: 8px;
      padding: 4px;
      box-shadow: inset 0 0 25px rgba(0,0,0,0.7);
      border: 1.5px solid #2a2a2a;
      aspect-ratio: 4 / 3;
    }
    .mac-screen {
      background: #000;
      border-radius: 4px;
      width: 100%; height: 100%;
      position: relative;
      overflow: hidden;
      padding: 10px 12px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
    }
    .mac-screen::after {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.15) 2px, rgba(0,0,0,0.15) 4px);
      pointer-events: none; z-index: 2;
    }
    .mac-screen::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at center, transparent 60%, rgba(0,255,65,0.015) 100%);
      pointer-events: none; z-index: 1;
    }
    .terminal {
      font-family: 'JetBrains Mono', monospace;
      font-size: clamp(0.45rem, 0.7vw, 0.65rem);
      color: #00FF41;
      line-height: 1.5;
      position: relative;
      z-index: 3;
      text-shadow: 0 0 6px rgba(0,255,65,0.1);
      overflow: hidden;
      max-height: 100%;
    }
    .terminal-line { white-space: pre-wrap; word-break: break-word; }
    .terminal-cursor::after { content: '█'; animation: blink 0.8s step-end infinite; color: #00FF41; }
    @keyframes blink { 0%,49% { opacity:1; } 50%,100% { opacity:0; } }

    .mac-chin {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 4px 0;
    }
    .mac-floppy { width:44px; height:7px; background:#444; border-radius:2px; border:1px solid #666; position:relative; }
    .mac-floppy::after { content:''; position:absolute; right:-6px; top:50%; transform:translateY(-50%); width:3px; height:3px; background:#333; border-radius:50%; }
    .mac-brand { font-family:'JetBrains Mono',monospace; font-size:0.4rem; letter-spacing:0.05em; color:rgba(100,80,60,0.4); }
    .mac-power { width:5px; height:5px; border-radius:50%; background:#00ff44; box-shadow:0 0 5px rgba(0,255,68,0.4); }

    /* === DIVIDER + MARQUEE === */
    .divider-line { height:1px; background:rgba(0,0,0,0.08); flex-shrink:0; }
    .marquee-section { height:64px; display:flex; align-items:center; overflow:hidden; flex-shrink:0; border-top:1px solid rgba(0,0,0,0.04); }
    .marquee-track { display:flex; flex-wrap:nowrap; width:200%; will-change:transform; animation:marquee 30s linear infinite; }
    .marquee-section:hover .marquee-track { animation-play-state:paused; }
    .marquee-content { display:flex; gap:2.5rem; align-items:center; flex-shrink:0; padding-right:2.5rem; }
    @keyframes marquee { 0%{transform:translateX(0)} 100%{transform:translateX(-50%)} }
    .marquee-content img { height:22px; width:auto; opacity:0.7; filter:brightness(0.6); transition:all 0.3s ease; }
    .marquee-content a:hover img { opacity:1; filter:brightness(1); }
    .marquee-fallback { font-family:'JetBrains Mono',monospace; font-size:0.55rem; color:rgba(0,0,0,0.15); }

    /* === FOOTER === */
    .site-footer {
      height: 28px;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 28px;
      flex-shrink: 0;
      font-size: 0.4rem;
      color: rgba(255,255,255,0.3);
      font-family: 'JetBrains Mono', monospace;
      letter-spacing: 0.05em;
    }
    .site-footer a { color:rgba(255,255,255,0.3); text-decoration:none; transition:color 0.2s; }
    .site-footer a:hover { color:rgba(255,255,255,0.6); }

    /* === MODAL === */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
      z-index: 100;
    }
    .modal-overlay.open { opacity: 1; pointer-events: auto; }
    .modal-card {
      background: #fff;
      border-radius: 20px;
      padding: 1.5rem;
      max-width: 400px;
      width: 90%;
      box-shadow: 0 30px 80px rgba(0,0,0,0.25);
      transform: scale(0.92) translateY(12px);
      transition: transform 0.35s cubic-bezier(0.16, 1, 0.3, 1);
      max-height: 80vh;
      overflow-y: auto;
      position: relative;
    }
    .modal-overlay.open .modal-card { transform: scale(1) translateY(0); }
    .modal-card--giant {
      max-width: 900px !important;
      width: 92% !important;
      max-height: 85vh !important;
      padding: 2rem !important;
    }
    .modal-close-btn {
      position: absolute;
      top: 12px;
      right: 16px;
      font-size: 1.5rem;
      color: rgba(0,0,0,0.15);
      cursor: pointer;
      background: none;
      border: none;
      transition: color 0.2s;
      line-height: 1;
      z-index: 2;
    }
    .modal-close-btn:hover { color: #000; }
    .modal-label { font-size:0.5rem; text-transform:uppercase; letter-spacing:0.1em; color:rgba(0,0,0,0.25); margin-bottom:0.15rem; }
    .modal-value { font-size:0.7rem; color:rgba(0,0,0,0.75); margin-bottom:0.5rem; }
    .modal-value:last-of-type { margin-bottom:1rem; }
    .var-btn {
      padding: 0.35rem 1rem;
      border-radius: 9999px;
      border: 1.5px solid rgba(0,0,0,0.1);
      background: transparent;
      cursor: pointer;
      font-size: 0.7rem;
      transition: all 0.2s;
      font-weight: 500;
    }
    .var-btn.active { border-color:#000; background:#000; color:#fff; }
    .buy-btn {
      padding: 0.6rem 1.5rem;
      background: #FF2A2A;
      color: #fff;
      font-weight: 700;
      font-size: 0.8rem;
      border-radius: 9999px;
      border: none;
      cursor: pointer;
      transition: all 0.3s;
      display: inline-block;
      text-decoration: none;
    }
    .buy-btn:hover { transform:translateY(-1px); box-shadow:0 6px 20px rgba(255,42,42,0.25); }
    .buy-btn--giant {
      padding: 0.85rem 2rem;
      font-size: 0.95rem;
      width: 100%;
      text-align: center;
    }

    /* === RESPONSIVE === */
    @media (max-width: 900px) {
      header { padding: 0 20px; }
      .panel-left { padding: 28px 24px; }
      .hero-title { font-size: clamp(1.4rem, 4vw, 2.2rem); }
    }
    @media (max-width: 768px) {
      html, body { overflow: visible; height: auto; }
      body { min-height: 100vh; overflow-y: auto; }
      .panel-left, .panel-right { width: 100%; }
      main { flex-direction: column; }
      .panel-left { padding: 2.5rem 20px 3.5rem; overflow-y:visible; justify-content:flex-start; }
      .panel-right { padding: 12px 20px 0; margin-bottom: 0.5rem; }
      .mac-wrapper { width: min(90%, 380px) !important; margin: 0 auto !important; transform: none !important; }
      .mac-casing { padding: 10px 10px 14px; border-radius: 20px 20px 10px 10px; }
      .mac-bezel { padding: 3px; }
      .mac-screen { padding: 6px 8px; }
      .terminal { font-size: clamp(0.5rem, 2vw, 0.65rem); }
      .mac-chin { padding: 4px 2px 0; }
      .mac-floppy { width: 30px; height: 5px; }
      .mac-brand { font-size: 0.3rem; }
      .mac-power { width: 4px; height: 4px; }
      .site-footer { padding: 0 16px; font-size:0.35rem; }
      .marquee-section { height: 52px; }
      .tiers-grid { grid-template-columns: repeat(2, 1fr); gap: 0.35rem; }
      .shop-grid { grid-template-columns: repeat(3, 1fr); gap: 0.35rem; }
      .modal-card--giant { padding: 1.25rem !important; }
    }
    @media (max-width: 500px) {
      .nav-link { font-size:0.5rem; letter-spacing:0.1em; }
      .nav-desktop .nav-link { font-size:0.8rem; }
      header { padding: 0 12px; gap: 4px; }
      .panel-left { padding: 1.5rem 14px 2rem; }
      .hero-title { font-size: 1.3rem; }
      .kicker { font-size:0.45rem; }
      .tiers-grid { grid-template-columns: repeat(2, 1fr); gap:0.25rem; }
      .tier-balloon { padding: 0.45rem; }
      .shop-grid { grid-template-columns: repeat(3, 1fr); gap:0.25rem; }
      .social-icon { width:24px; height:24px; }
      .social-icon svg { width:12px; height:12px; }
    }
  </style>
</head>

      shopData.forEach(p => {
        html += `<div class="shop-card" onclick="openShopModal('${p.id}','${p.name}','${p.emoji}','${p.desc}','${p.price}')">

          <div class="shop-card-price">${p.price}</div>

O resultado é um portal que funciona em alta frequência, com cobertura contínua de tecnologia, esportes e geopolítica, operando sem dependência de uma redação tradicional.</p>

    function renderContato() {
      leftPanel.innerHTML = `
        <div class="kicker">SECURE COMMS</div>

            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#FF2A2A" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
            <a href="tel:+5513996500270" style="color:#000;text-decoration:none;">+55 13 99650-0270</a>
          </div>
          <div style="display:flex;align-items:center;gap:0.5rem;font-size:0.75rem;font-weight:600;">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#FF2A2A" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>

      `;

    const renderers = { home: renderHome, about: renderAbout, tiers: renderTiers, shop: renderShop, media4fun: renderMedia4Fun, contato: renderContato };

    // ===== STATE SWITCH =====
    function switchState(state) {
      if (state === currentState) return;
      if (isTyping) { clearTimeout(typeTimer); typeTimer = null; isTyping = false; }
      navLinks.forEach(l => l.classList.toggle('active', l.dataset.state === state));
      currentState = state;
      if (renderers[state]) renderers[state]();
      const script = terminalScripts[state];
      if (script && script.length) typeLines(script, elTerminal, () => {});
      closeModal();
    }

    // ===== PRODUCT MODAL (GIANT) =====
    function openProductModal(idx) {
      const p = products[idx];
      if (!p) return;
      let html = `
        <div style="text-align:left;">
          <p style="font-family:'JetBrains Mono',monospace;font-size:0.55rem;color:#FF2A2A;letter-spacing:0.08em;margin-bottom:0.5rem;">PRODUTO ${String(idx+1).padStart(2,'0')}</p>
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.2rem;">
            <h2 style="font-family:'Playfair Display',serif;font-size:1.5rem;font-weight:900;line-height:1.1;">${p.name}</h2>
            <span style="font-size:1.3rem;font-weight:800;color:#FF2A2A;white-space:nowrap;">${p.price}</span>
          </div>
      `;
      if (p.target) html += `<p class="modal-label">Target</p><p class="modal-value">${p.target}</p>`;
      if (p.arch) html += `<p class="modal-label">Arquitetura</p><p class="modal-value">${p.arch}</p>`;
      if (p.tech) html += `<p class="modal-label">Tech Stack</p><p class="modal-value">${p.tech}</p>`;
      if (p.edge) html += `<p class="modal-label">Dev4Fun EDGE</p><p class="modal-value">${p.edge}</p>`;
      html += `
          <div style="margin-top:1rem;border-top:1px solid rgba(0,0,0,0.06);padding-top:1rem;">
            <a href="http://api.whatsapp.com/send?1=pt_BR&phone=5513996500270" target="_blank" rel="noopener noreferrer" class="buy-btn buy-btn--giant">Solicitar Projeto →</a>
          </div>
        </div>
      `;
      modalBody.classList.add('modal-card--giant');
      modalBody.innerHTML = html;
      modalOverlay.classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    // ===== SHOP MODAL =====
    function openShopModal(id, name, emoji, desc, price) {
      let html = `<div style="text-align:center;">
        <div style="font-size:2.5rem;margin-bottom:0.3rem;">${emoji}</div>
        <h3 style="font-size:1.1rem;font-weight:800;margin-bottom:0.2rem;">${name}</h3>
        <p style="font-size:0.7rem;color:rgba(0,0,0,0.35);margin-bottom:0.8rem;">${desc} — ${price}</p>
        <div style="display:flex;gap:0.4rem;justify-content:center;margin-bottom:0.8rem;">
          <button class="var-btn active" data-var="white" onclick="selectVar(this)">Branco</button>
          <button class="var-btn" data-var="black" onclick="selectVar(this)">Preto</button>
        </div>
        <button class="buy-btn" data-product-id="${id}" onclick="handleShopBuy(this)">Comprar Agora</button>
      </div>`;
      modalBody.classList.remove('modal-card--giant');
      modalBody.innerHTML = html;
      modalOverlay.classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    // ===== MODAL CONTROL =====
    function closeModal() {
      modalOverlay.classList.remove('open');
      document.body.style.overflow = '';
    }
    modalOverlay.addEventListener('click', e => { if (e.target === modalOverlay) closeModal(); });

    function selectVar(el) {
      document.querySelectorAll('.var-btn').forEach(b => b.classList.remove('active'));
      el.classList.add('active');
    }
    function handleShopBuy(btn) {
      const variation = document.querySelector('.var-btn.active')?.dataset.var || 'white';
      const name = modalBody.querySelector('h3')?.textContent || '';
      alert(`🛒 Pedido: ${name}\nVariação: ${variation}\n\n(Simulação — API externa será integrada.)`);
      closeModal();
    }

    // ===== MOBILE NAV =====
    function toggleMobileNav() { document.getElementById('main-nav').classList.toggle('open'); }
    function closeMobileNav() { document.getElementById('main-nav').classList.remove('open'); }

    // ===== NAV CLICKS =====
    navLinks.forEach(btn => {
      btn.addEventListener('click', () => { switchState(btn.dataset.state); closeMobileNav(); });
    });

    // ===== LOGO FALLBACK =====
    document.querySelectorAll('.marquee-content img').forEach(img => {
      img.addEventListener('error', function() {
        this.style.display = 'none';
        const fb = document.createElement('span');
        fb.className = 'marquee-fallback';
        try { fb.textContent = new URL(this.closest('a')?.href || '').hostname.replace('www.','').split('.')[0].toUpperCase(); }
        catch { fb.textContent = '?'; }
        this.parentElement?.appendChild(fb);
      });
    });

    // ===== KEYBOARD =====
    document.addEventListener('keydown', e => {
      const order = ['home', 'about', 'tiers', 'shop', 'media4fun', 'contato'];
      const idx = order.indexOf(currentState);
      if (e.key === 'ArrowRight' && idx < order.length - 1) switchState(order[idx + 1]);
      if (e.key === 'ArrowLeft' && idx > 0) switchState(order[idx - 1]);
      if (e.key === 'Escape') closeModal();
    });

    // ===== INIT =====
    renderHome();
    typeLines(terminalScripts.home, elTerminal, () => {});
    console.log('🚀 Dev4Fun — fine-tuned.');
  </script>
